apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-metrics-api
  namespace: devops-metrics-staging
  labels:
    app: devops-metrics-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-metrics-api
  template:
    metadata:
      labels:
        app: devops-metrics-api
    spec:
      containers:
        - name: api
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10